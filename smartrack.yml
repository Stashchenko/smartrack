# vl53l0x module
i2c:
  sda: GPIO6
  scl: GPIO7
  scan: true

sensor:
  - platform: vl53l0x
    name: "Distance"
    id: distance
    update_interval: 300ms
    internal: true
    on_value:
      then:
        - lambda: |-
            static int detect = 0;
            static int miss = 0;
            static bool state = false;

            if (std::isnan(x)) {
              miss++;
              detect = 0;
            } else if (x <= 0.5) {
              detect++;
              miss = 0;
            } else {
              miss++;
              detect = 0;
            }

            if (detect >= 3) state = true;
            if (miss >= 3) state = false;

            id(occupancy).publish_state(state);

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    id: wifi_signal_db
    entity_category: "diagnostic"
    internal: true  # hide this sensor to HA,

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    icon: mdi:wifi
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: " %"
    entity_category: "diagnostic"
    device_class: ""

  # for lgvl
  - platform: homeassistant
    id: cpu_usage
    entity_id: sensor.192_168_1_11_cpu_usage
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: cpu_usage_label
            text: !lambda |-
              char buf[10];
              sprintf(buf, "%.0f%%", x);
              return std::string(buf);
  - platform: homeassistant
    id: cpu_temp
    entity_id: sensor.cpu_temperature_average
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: cpu_temp_label
            text: !lambda |-
              if (isnan(x)) return std::string("--°C");
              char buf[10];
              sprintf(buf, "%.0f°C", x);
              return std::string(buf);
  - platform: homeassistant
    id: ram_usage
    entity_id: sensor.192_168_1_11_memory_usage
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: ram_usage_label
            text: !lambda |-
              if (isnan(x)) return std::string("--%");
              char buf[10];
              sprintf(buf, "%.0f%%", x);
              return std::string(buf);
  - platform: homeassistant
    id: nas_usage
    entity_id: sensor.192_168_1_11_tank_data_disk_usage
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: nas_usage_label
            text: !lambda |-
              if (isnan(x)) return std::string("--%");
              char buf[10];
              sprintf(buf, "%.0f%%", x);
              return std::string(buf);
number:
  - platform: template
    name: "Occup. Fade Time"
    id: occupancy_fade_time
    icon: "mdi:timer-sand"
    min_value: 5
    max_value: 60
    step: 5
    initial_value: 20
    unit_of_measurement: "s"
    optimistic: true
    entity_category: config


binary_sensor:
  - platform: template
    name: "Occupancy"
    id: occupancy
    device_class: occupancy
    filters:
      - delayed_on_off:
          time_on: 5ms
          time_off: !lambda |-
            return (uint32_t)(id(occupancy_fade_time).state * 1000);
    on_press:
      then:
        - light.turn_on:
            id: backlight
            transition_length: 500ms
        - light.turn_on:
            id: leds_internal
            brightness: 40%
            transition_length: 1s
    on_release:
      then:
        - light.turn_off:
            id: backlight
            transition_length: 500ms
        - light.turn_off:
            id: leds_internal
            transition_length: 1s
# Display
output:
  - platform: ledc
    pin: GPIO21
    id: backlight_output
    inverted: true

spi:
  clk_pin: GPIO12
  mosi_pin: GPIO11

display:
  - platform: mipi_spi
    id: rack_display
    model: ST7789V
    buffer_size: 100%
    dc_pin: GPIO16
    cs_pin: GPIO17
    reset_pin: GPIO18
    dimensions:
      height: 284
      width: 76
      offset_height: 18
      offset_width: 82
    update_interval: never
    color_order: BGR


