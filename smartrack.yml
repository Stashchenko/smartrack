substitutions:
  COLOR_TEXT: "0x21A321"
  COLOR_ICON: "0x005300"

esphome:
  name: smartrack
  friendly_name: SmartRack
  min_version: 2026.4.3

esp32:
  board: esp32-s3-devkitc-1
  cpu_frequency: 240MHz
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: arduino
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"

      # Moves instructions and read only data from flash into PSRAM on boot.
      # Both enabled allows instructions to execute while a flash operation is in progress without needing to be placed in IRAM.
      # Considerably speeds up mWW at the cost of using more PSRAM.
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"

      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"

      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y"  # TLS1.3 support isn't enabled by default in IDF 5.1.5

      # enable psram
      CONFIG_SPIRAM_MODE_OCT: "y"
      CONFIG_SPIRAM: "y"
      CONFIG_ESPTOOLPY_FLASHMODE_QIO: "y"
      CONFIG_ESPTOOLPY_FLASHFREQ_80M: "y"
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"

psram:
  mode: octal
  speed: 80MHz
  ignore_not_found: false

# Enable logging
logger:
  level: WARN
  logs:
    sensor: ERROR
    vl53l0x: ERROR
# Enable Home Assistant API
api:
  encryption:
    key: "c4y/np3gKHLpz+vHLLs3nedIhYea63ZQehf4l8aXpR8="

ota:
  - platform: esphome
    password: "791f8ce0b949e84102bef49980e3f69b"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "SmartRack"
    password: "nsJBKQz8onCz"

captive_portal:

light:
  - platform: esp32_rmt_led_strip
    id: leds_internal
    name: "LED Ring"
    icon: "mdi:rectangle-outline"
    pin: GPIO14
    chipset: WS2812
    max_refresh_rate: 20ms
    num_leds: 24
    rgb_order: GRB
    rmt_symbols: 64
    default_transition_length: 0ms
    on_turn_on:
      - light.control:
          id: leds_internal
          brightness: 40%
          red: 0%
          green: 32%
          blue: 0%
    effects:
      - random:
      - pulse:
      - strobe:
      - flicker:
      - addressable_rainbow:
      - addressable_color_wipe:
      - addressable_scan:

  - platform: esp32_rmt_led_strip
    id: led_rack
    name: "LED Rack"
    icon: "mdi:cube-outline"
    pin: GPIO13
    chipset: WS2812
    max_refresh_rate: 20ms
    num_leds: 148
    rgb_order: GRB
    rmt_symbols: 192
    default_transition_length: 0ms
    on_turn_on:
      - light.control:
          id: led_rack
          brightness: 70%
          red: 0%
          green: 32%
          blue: 0%
    effects:
      - random:
      - pulse:
      - strobe:
      - flicker:
      - addressable_rainbow:
      - addressable_color_wipe:
      - addressable_scan:

  - platform: monochromatic
    output: backlight_output
    icon: "mdi:brightness-6"
    name: Display Backlight
    id: backlight
    restore_mode: ALWAYS_OFF
    on_turn_on:
      then:
        - lvgl.obj.update:
            id: overlay
            hidden: true
        - lvgl.animimg.start:
            id: matrix_animation
    on_turn_off:
      then:
        - lvgl.obj.update:
            id: overlay
            hidden: false
        - lvgl.animimg.stop:
            id: matrix_animation


